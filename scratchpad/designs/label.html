<!doctype html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1000px;height:520px;overflow:hidden}
body{font-family:Georgia,serif;background:#0b0c10;display:flex;align-items:center;justify-content:center}
.label{width:900px;height:430px;border-radius:20px;position:relative;overflow:hidden;
  background:radial-gradient(700px 400px at 15% 0%,#1c1a22,#0d0d11 70%);
  border:1px solid rgba(231,162,76,.4);box-shadow:0 30px 70px rgba(0,0,0,.6)}
.gild{position:absolute;inset:0;background:
  repeating-linear-gradient(90deg,transparent 0 46px,rgba(231,162,76,.05) 46px 47px)}
.side{position:absolute;left:0;top:0;bottom:0;width:150px;background:linear-gradient(160deg,#f8da98,#e7a24c 50%,#c9851f);
  display:flex;align-items:center;justify-content:center}
.side b{writing-mode:vertical-rl;transform:rotate(180deg);font-family:Arial,sans-serif;font-weight:900;letter-spacing:.42em;font-size:22px;color:#3a2708;text-transform:uppercase}
.body{position:absolute;left:150px;right:0;top:0;bottom:0;padding:44px 46px;color:#f4f2ee;display:flex;flex-direction:column}
.kicker{font-family:Arial,sans-serif;letter-spacing:.4em;font-size:13px;color:#e7a24c;font-weight:700;text-transform:uppercase}
.title{font-size:64px;font-weight:900;line-height:1;margin-top:14px;
  background:linear-gradient(120deg,#fbe6b4,#e7a24c 50%,#c9851f);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-family:Arial,sans-serif;color:#b8b1a4;font-size:17px;margin-top:14px;letter-spacing:.05em}
.row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-family:Arial,sans-serif}
.badge{border:1px solid rgba(231,162,76,.5);border-radius:40px;padding:9px 20px;font-size:14px;font-weight:700;color:#f8da98;letter-spacing:.05em}
.net{text-align:right}
.net .l{font-size:12px;color:#8a857a;letter-spacing:.2em}
.net .v{font-size:26px;font-weight:900;color:#fff}
.dots{position:absolute;top:22px;right:26px;display:flex;gap:7px}
.dots i{width:10px;height:10px;border-radius:50%;background:rgba(231,162,76,.55)}
</style></head><body>
<div class="label">
  <div class="gild"></div>
  <div class="side"><b>Premium</b></div>
  <div class="body">
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="kicker">Product Label &amp; Packaging</div>
    <div class="title">Your Brand<br>Here</div>
    <div class="sub">Stickers, product labels, packaging &amp; wrappers — <br>har shape, waterproof, full colour.</div>
    <div class="row">
      <span class="badge">Any Shape • Waterproof</span>
      <div class="net"><div class="l">DESIGNED &amp; PRINTED BY</div><div class="v">Al Tariq Printers</div></div>
    </div>
  </div>
</div>
</body></html>
