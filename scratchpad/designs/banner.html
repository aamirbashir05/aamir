<!doctype html><html><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:600px;overflow:hidden}
body{font-family:Georgia,'Times New Roman',serif;
  background:radial-gradient(1000px 500px at 80% -10%,rgba(231,162,76,.22),transparent 60%),linear-gradient(135deg,#111015 0%,#0a0a0d 60%,#050506 100%);
  color:#f4f2ee;position:relative}
.frame{position:absolute;inset:26px;border:2px solid rgba(231,162,76,.5);border-radius:14px}
.frame::before{content:"";position:absolute;inset:8px;border:1px solid rgba(231,162,76,.22);border-radius:9px}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px}
.ey{letter-spacing:.55em;font-family:Arial,sans-serif;font-size:16px;font-weight:700;color:#e7a24c;text-transform:uppercase;margin-bottom:18px}
.mark{font-size:104px;font-weight:900;line-height:.98;letter-spacing:.01em;
  background:linear-gradient(120deg,#fbe6b4,#e7a24c 45%,#c9851f);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 30px rgba(231,162,76,.15)}
.sub{font-family:Arial,sans-serif;letter-spacing:.38em;font-size:20px;font-weight:600;color:#cbb48c;text-transform:uppercase;margin-top:12px}
.rule{width:150px;height:3px;margin:26px auto 24px;background:linear-gradient(90deg,transparent,#e7a24c,transparent)}
.serv{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-family:Arial,sans-serif}
.chip{border:1px solid rgba(231,162,76,.45);border-radius:40px;padding:9px 20px;font-size:15px;font-weight:700;color:#f8da98;letter-spacing:.03em;background:rgba(231,162,76,.06)}
.foot{position:absolute;left:0;right:0;bottom:46px;text-align:center;font-family:Arial,sans-serif;font-size:17px;color:#9a9488;letter-spacing:.04em}
.foot b{color:#f4f2ee}
.corner{position:absolute;width:34px;height:34px;border:2px solid #e7a24c}
.c1{top:34px;left:34px;border-right:0;border-bottom:0}.c2{top:34px;right:34px;border-left:0;border-bottom:0}
.c3{bottom:34px;left:34px;border-right:0;border-top:0}.c4{bottom:34px;right:34px;border-left:0;border-top:0}
</style></head><body>
<div class="frame"></div>
<span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
<div class="wrap">
  <div class="ey">Rawalpindi &nbsp;•&nbsp; Mansehra</div>
  <div class="mark">AL&nbsp;TARIQ</div>
  <div class="sub">Printers &amp; Advertisers</div>
  <div class="rule"></div>
  <div class="serv">
    <span class="chip">Flex &amp; Panaflex</span>
    <span class="chip">Banners</span>
    <span class="chip">Shop Boards</span>
    <span class="chip">Large Format</span>
  </div>
</div>
<div class="foot">Har size ka flex • Weather-proof printing • <b>Fori Delivery</b></div>
</body></html>
