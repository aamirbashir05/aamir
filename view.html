<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17181d">
  <title>Al Tariq Printers — Aap ka Hisaab</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta property="og:title" content="Al Tariq Printers — Aap ka Hisaab">
  <meta property="og:site_name" content="Al Tariq Printers">
  <meta property="og:description" content="Apna poora hisaab dekhein aur PDF download karein">
  <meta property="og:image" content="https://aamirbashir05.github.io/aamir/assets/icon-512.png">
  <meta property="og:type" content="website">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans", system-ui, sans-serif;
      background: #f1f5f9; color: #0f172a; margin: 0; padding: 0; line-height: 1.5;
    }
    .sheet { max-width: 720px; margin: 0 auto; background: #fff; min-height: 100vh; }
    .header {
      background: #17181d; color: #fff; padding: 22px 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .header img.logo { height: 54px; width: auto; max-width: 80px; object-fit: contain; }
    .header .htext { min-width: 0; }
    .header .shop { font-size: 22px; font-weight: 800; }
    .header .sub { font-size: 13px; opacity: .9; margin-top: 2px; }
    .meta { padding: 18px 24px; border-bottom: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; gap: 6px 24px; }
    .meta div { font-size: 14px; }
    .meta .k { color: #64748b; }
    .balance {
      margin: 20px 24px; padding: 18px; border-radius: 14px; text-align: center;
    }
    .balance.pos { background: #dcfce7; }
    .balance.neg { background: #fee2e2; }
    .balance.zero { background: #f1f5f9; }
    .balance .lbl { font-size: 14px; color: #475569; }
    .balance .amt { font-size: 30px; font-weight: 800; margin-top: 4px; }
    .pos-t { color: #16a34a; } .neg-t { color: #dc2626; } .zero-t { color: #64748b; }
    h3 { margin: 8px 24px; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    table { width: calc(100% - 48px); margin: 0 24px 20px; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; color: #64748b; padding: 8px 6px; border-bottom: 2px solid #e2e8f0; }
    th.r, td.r { text-align: right; }
    td { padding: 10px 6px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: top; }
    .debit { color: #dc2626; font-weight: 700; }
    .credit { color: #16a34a; font-weight: 700; }
    tfoot td { font-weight: 800; border-top: 2px solid #e2e8f0; font-size: 15px; padding-top: 12px; }
    .toolbar {
      position: sticky; bottom: 0; background: #fff; border-top: 1px solid #e2e8f0;
      padding: 12px 16px; display: flex; gap: 10px; max-width: 720px; margin: 0 auto;
    }
    .toolbar button {
      flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px;
      font-weight: 700; cursor: pointer;
    }
    .btn-pdf { background: #e7a24c; color: #17181d; }
    .btn-print { background: #e2e8f0; color: #0f172a; }
    .foot { text-align: center; color: #94a3b8; font-size: 12px; padding: 8px 24px 24px; }
    .error { padding: 60px 24px; text-align: center; color: #64748b; }
    .error .big { font-size: 48px; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .sheet { max-width: 100%; }
      .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .balance, .debit, .credit { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body>
  <div class="sheet" id="sheet"></div>

  <script src="js/firebase-config.js"></script>
  <script>
    function decodeData(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      const bin = atob(str);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return JSON.parse(new TextDecoder().decode(bytes));
    }
    function fmtMoney(n) {
      const v = Math.abs(Math.round(n * 100) / 100);
      return 'Rs ' + v.toLocaleString('en-PK', { maximumFractionDigits: 2 });
    }
    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function esc(s) {
      return (s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function norm(d) {
      if (d && d.v === 2) return {
        shop: d.s, shopPhone: d.sp, logo: d.lg, bl: d.bl, name: d.n, phone: d.p, balance: d.b,
        gen: d.g ? new Date(parseInt(d.g, 36) * 1000).toISOString() : new Date().toISOString(),
        txns: (d.t || []).map(a => ({ a: a[0], y: a[1] === 'd' ? 'debit' : 'credit', n: a[2], d: new Date(parseInt(a[3], 36) * 1000).toISOString() }))
      };
      return { shop: d.shop, shopPhone: d.shopPhone, logo: d.logo, bl: d.bl, name: d.name, phone: d.phone, balance: d.balance, gen: d.gen, txns: (d.txns || []).map(t => ({ a: t.a, y: t.y, n: t.n, d: t.d })) };
    }
    const sheet = document.getElementById('sheet');
    function showErr(msg, ic) {
      sheet.innerHTML = '<div class="error"><div class="big">' + (ic || '⚠️') + '</div><p>' + msg + '</p></div>';
    }
    function getParam(name) {
      try { const v = new URL(location.href).searchParams.get(name); if (v) return v; } catch (e) {}
      const mm = (location.hash || '').match(new RegExp('[#&]' + name + '=([^&]+)'));
      return mm ? decodeURIComponent(mm[1]) : null;
    }
    function loadScript(src) { return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
    async function loadLive(token) {
      if (!window.FIREBASE_CONFIG) { showErr('Live hisaab abhi set nahi hua. Baraye meharbani sahib se naya link mangwayein.', '📄'); return; }
      showErr('Hisaab load ho raha hai…', '⏳');
      try {
        if (!(window.firebase && window.firebase.firestore)) {
          const base = 'https://www.gstatic.com/firebasejs/10.12.2/';
          await loadScript(base + 'firebase-app-compat.js');
          await loadScript(base + 'firebase-firestore-compat.js');
        }
        firebase.apps.length ? firebase.app() : firebase.initializeApp(window.FIREBASE_CONFIG);
        const doc = await firebase.firestore().collection('share').doc(token).get();
        if (!doc.exists || !doc.data().data) { showErr('Hisaab nahi mila. Naya link mangwayein.', '📄'); return; }
        renderData(norm(doc.data().data));
      } catch (e) { showErr('Load nahi hua. Internet check karke dobara kholein.'); }
    }
    function render() {
      const id = getParam('id');
      if (id) { loadLive(id); return; }
      const m = (location.hash || '').match(/[#&]d=([^&]+)/);
      if (!m) { showErr('Hisaab ka data nahi mila. Baraye meharbani sahi link kholein.', '📄'); return; }
      let data;
      try { data = norm(decodeData(decodeURIComponent(m[1]))); }
      catch (e) { showErr('Link kharab ho gaya lagta hai. Naya link mangwayein.'); return; }
      renderData(data);
    }
    function renderData(data) {
      const b = data.balance;
      const balCls = b > 0 ? 'pos' : b < 0 ? 'neg' : 'zero';
      const balTxtCls = b > 0 ? 'pos-t' : b < 0 ? 'neg-t' : 'zero-t';
      const balLbl = b > 0 ? 'Aap par baqi hai (Total Lena)'
                    : b < 0 ? 'Dukan ke zimmay hai' : 'Hisaab barabar hai';

      let running = 0;
      const rows = (data.txns || []).map(t => {
        const isDebit = t.y === 'debit';
        running += isDebit ? t.a : -t.a;
        return `<tr>
          <td>${fmtDate(t.d)}</td>
          <td>${esc(t.n) || (isDebit ? 'Maal Diya' : 'Paisay Milay')}</td>
          <td class="r ${isDebit ? 'debit' : ''}">${isDebit ? fmtMoney(t.a) : ''}</td>
          <td class="r ${!isDebit ? 'credit' : ''}">${!isDebit ? fmtMoney(t.a) : ''}</td>
          <td class="r">${fmtMoney(running)}</td>
        </tr>`;
      }).join('');

      document.title = 'Hisaab — ' + (data.name || '');

      const _hi = '<img class="logo" src="' + (data.logo || 'assets/logo.png') + '" alt="logo"><div class="htext"><div class="shop">' + esc(data.shop || 'Al Tariq Printers') + '</div><div class="sub">' + (data.shopPhone ? 'Rabta: ' + esc(data.shopPhone) : 'Hisaab / Ledger') + '</div></div>';
      const headerHtml = '<div class="header">' + (data.bl ? '<a href="' + esc(data.bl) + '" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:14px;color:inherit;text-decoration:none">' + _hi + '</a>' : _hi) + '</div>';

      sheet.innerHTML = `
        ${headerHtml}
        <div class="meta">
          <div><span class="k">Customer:</span> <b>${esc(data.name)}</b></div>
          ${data.phone ? `<div><span class="k">Number:</span> ${esc(data.phone)}</div>` : ''}
          <div><span class="k">Tareekh:</span> ${fmtDate(data.gen || new Date().toISOString())}</div>
        </div>
        <div class="balance ${balCls}">
          <div class="lbl">${balLbl}</div>
          <div class="amt ${balTxtCls}">${fmtMoney(b)}</div>
        </div>
        <h3>Lein-Dein ki Tafseel</h3>
        <table>
          <thead>
            <tr><th>Tareekh</th><th>Tafseel</th><th class="r">Maal</th><th class="r">Jama</th><th class="r">Baqaya</th></tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px;">Koi lein-dein nahi</td></tr>'}</tbody>
          <tfoot>
            <tr><td colspan="4">Total Baqaya</td><td class="r ${balTxtCls}">${fmtMoney(b)}</td></tr>
          </tfoot>
        </table>
        <div class="foot">Ye hisaab ${esc(data.shop || 'Al Tariq Printers')} ne bheja hai • ${fmtDate(data.gen || new Date().toISOString())}</div>
        <div class="toolbar">
          <button class="btn-pdf" onclick="window.print()">📄 PDF Download</button>
          <button class="btn-print" onclick="window.print()">🖨 Print</button>
        </div>
      `;
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
