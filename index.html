<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <title>Mera Khata — Udhaar Book</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- HOME / LIST VIEW -->
  <div id="homeView">
    <div class="topbar">
      <h1 id="shopTitle">Mera Khata</h1>
      <button class="icon-btn" id="btnSettings" title="Settings">⚙️</button>
    </div>
    <div class="wrap">
      <div class="summary">
        <div class="sum-card lena">
          <div class="label">Total Lena (Milna hai)</div>
          <div class="val" id="totalLena">Rs 0</div>
        </div>
        <div class="sum-card dena">
          <div class="label">Total Dena (Dena hai)</div>
          <div class="val" id="totalDena">Rs 0</div>
        </div>
      </div>
      <input class="search" id="searchBox" placeholder="🔍 Customer dhoondein...">
      <div class="list" id="custList"></div>
    </div>
    <button class="fab" id="btnAddCust"><span class="plus">+</span> Naya Customer</button>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" class="hidden">
    <div class="topbar">
      <button class="back" id="btnBack" style="display:flex">‹</button>
      <h1 id="detailTitle">Customer</h1>
      <button class="icon-btn" id="btnEditCust" title="Edit">✏️</button>
    </div>
    <div class="wrap">
      <div class="detail-head">
        <div class="name" id="dName"></div>
        <div class="phone" id="dPhone"></div>
        <div class="balance-box" id="dBalanceBox">
          <div class="b-label" id="dBalLabel"></div>
          <div class="b-amt" id="dBalAmt"></div>
        </div>
      </div>
      <div class="share-row">
        <button class="btn btn-wa" id="btnWhatsApp">💬 WhatsApp par bhejein</button>
        <button class="btn btn-link" id="btnCopyLink">🔗 Link Copy</button>
      </div>
      <div class="section-title">Lein-Dein (Transactions)</div>
      <div class="txn-list" id="txnList"></div>
    </div>
    <div style="position:fixed; bottom:22px; left:0; right:0; display:flex; gap:12px; padding:0 22px; max-width:640px; margin:0 auto;">
      <button class="btn" style="background:var(--red); color:#fff; box-shadow:0 6px 16px rgba(220,38,38,.35);" id="btnGave">− Udhaar Diya</button>
      <button class="btn" style="background:var(--green); color:#fff; box-shadow:0 6px 16px rgba(22,163,74,.35);" id="btnGot">+ Paisay Milay</button>
    </div>
  </div>

  <!-- CUSTOMER MODAL -->
  <div class="modal-bg" id="custModal">
    <div class="modal">
      <h2 id="custModalTitle">Naya Customer</h2>
      <div class="field">
        <label>Naam</label>
        <input id="custName" placeholder="Customer ka naam" autocomplete="off">
      </div>
      <div class="field">
        <label>Mobile Number (optional)</label>
        <input id="custPhone" type="tel" placeholder="03XX-XXXXXXX" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="cancel" data-close>Cancel</button>
        <button class="save" id="saveCust">Save</button>
      </div>
      <div class="modal-actions" id="deleteCustRow" style="margin-top:10px;">
        <button class="save danger" id="deleteCust" style="flex:1;">🗑 Customer Delete Karein</button>
      </div>
    </div>
  </div>

  <!-- TXN MODAL -->
  <div class="modal-bg" id="txnModal">
    <div class="modal">
      <h2 id="txnModalTitle">Lein-Dein</h2>
      <div class="type-toggle">
        <button id="typeDebit">− Udhaar Diya</button>
        <button id="typeCredit">+ Paisay Milay</button>
      </div>
      <div class="field">
        <label>Raqam (Rs)</label>
        <input id="txnAmount" class="amount-input" type="number" inputmode="decimal" placeholder="0" step="0.01">
      </div>
      <div class="field">
        <label>Tafseel / Note (optional)</label>
        <input id="txnNote" placeholder="Misaal: Cement 2 bori" autocomplete="off">
      </div>
      <div class="field">
        <label>Tareekh</label>
        <input id="txnDate" type="date">
      </div>
      <div class="modal-actions">
        <button class="cancel" data-close>Cancel</button>
        <button class="save" id="saveTxn">Save</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-bg" id="settingsModal">
    <div class="modal">
      <h2>Settings</h2>
      <div class="field">
        <label>Dukan / Business ka Naam</label>
        <input id="setShopName" placeholder="Misaal: Aamir Traders">
      </div>
      <div class="field">
        <label>Aap ka Mobile Number</label>
        <input id="setShopPhone" type="tel" placeholder="03XX-XXXXXXX">
      </div>
      <div class="field">
        <label>Link ka Web Address (Viewer URL)</label>
        <input id="setViewerBase" placeholder="https://username.github.io/aamir">
        <div class="settings-note">Jab aap ye app apni website (GitHub Pages) se kholenge to ye khud bhar jayega. Customer ke link isi address par bante hain.</div>
      </div>
      <div class="section-title">Backup</div>
      <div class="modal-actions" style="margin-bottom:10px;">
        <button class="cancel" id="btnExport" style="flex:1;">⬇️ Backup Save</button>
        <button class="cancel" id="btnImport" style="flex:1;">⬆️ Backup Load</button>
      </div>
      <input type="file" id="importFile" accept="application/json" class="hidden">
      <div class="modal-actions">
        <button class="cancel" data-close>Band karein</button>
        <button class="save" id="saveSettings">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
